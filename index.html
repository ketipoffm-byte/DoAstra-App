<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoAstra</title>
  <style>
    :root {
      --bg:#f7f7f4; --panel:#ffffff; --soft:#f1f2f5; --text:#15161a; --muted:#8a8f9c;
      --line:rgba(20,25,35,.1); --accent:#1687ff; --danger:#ff4d5d; --warn:#f5a524;
      --good:#21a977; --shadow:0 24px 70px rgba(20,25,35,.12); --radius:28px;
    }
    body.dark {
      --bg:#101219; --panel:#181b25; --soft:#222633; --text:#f5f6fb; --muted:#9fa6b8;
      --line:rgba(255,255,255,.1); --shadow:0 24px 80px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:radial-gradient(circle at 5% 3%,color-mix(in srgb,var(--accent) 18%,transparent),transparent 34%),
                 radial-gradient(circle at 98% 95%,rgba(130,220,195,.16),transparent 33%),var(--bg);
      color:var(--text);overflow:hidden;
    }
    button,input,textarea,select{font:inherit;color:inherit}button{border:0;cursor:pointer}
    input,textarea,select{width:100%;min-width:0;border:1px solid var(--line);background:var(--panel);border-radius:15px;padding:12px 13px;outline:none}
    textarea{min-height:88px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:color-mix(in srgb,var(--accent) 55%,var(--line));box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 13%,transparent)}
    .app{height:100vh;display:grid;grid-template-columns:310px minmax(0,1fr);gap:18px;padding:18px}
    .glass{background:color-mix(in srgb,var(--panel) 88%,transparent);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
    .sidebar{border-radius:var(--radius);padding:18px;overflow:hidden;display:flex;flex-direction:column;animation:enter .45s ease both}
    .brand{display:flex;align-items:center;gap:13px;padding:10px 9px 22px}
    .logo{width:50px;height:50px;border-radius:18px;display:grid;place-items:center;color:white;background:linear-gradient(135deg,var(--accent),#8bdcc2);box-shadow:0 14px 32px color-mix(in srgb,var(--accent) 35%,transparent);font-size:26px}
    .brand h1{margin:0;font-size:25px;letter-spacing:-.06em}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .nav{display:grid;gap:7px;margin-bottom:17px}.nav button,.list-row{display:flex;align-items:center;gap:12px;width:100%;padding:12px;border-radius:17px;background:transparent;text-align:left;transition:.18s ease}
    .nav button:hover,.list-row:hover{transform:translateX(4px);background:color-mix(in srgb,var(--accent) 9%,transparent)}
    .nav button.active{background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);font-weight:850}
    .count{margin-left:auto;color:var(--muted);font-size:12px;background:color-mix(in srgb,var(--muted) 13%,transparent);padding:3px 8px;border-radius:999px}
    .section-title{margin:10px 9px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.11em}
    .lists{overflow:auto;padding-right:3px}.dot{width:13px;height:13px;border-radius:5px;flex:none}.list-name{flex:1;min-width:0}
    .list-actions{margin-left:auto;display:flex;gap:4px;align-items:center}.mini{background:transparent;color:var(--muted);width:25px;height:25px;border-radius:9px}.mini:hover{background:color-mix(in srgb,var(--muted) 15%,transparent)}
    .add-list{margin-top:12px;border:1px solid var(--line);background:transparent;border-radius:18px;color:var(--accent);padding:12px}
    .main{border-radius:var(--radius);overflow:hidden;display:grid;grid-template-rows:auto 1fr;position:relative;animation:enter .45s ease .05s both}
    .top{padding:30px 32px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
    .title{flex:1}.title h2{margin:0;font-size:48px;letter-spacing:-.075em;line-height:.95}.title p{margin:10px 0 0;color:var(--muted)}
    .btn{border-radius:16px;padding:12px 16px;font-weight:800;white-space:nowrap;transition:.18s ease}.btn:hover{transform:translateY(-2px)}
    .primary{background:var(--accent);color:white;box-shadow:0 16px 32px color-mix(in srgb,var(--accent) 33%,transparent)}.ghost{background:var(--panel);border:1px solid var(--line)}.danger{background:color-mix(in srgb,var(--danger) 12%,transparent);color:var(--danger)}
    .content{overflow:auto;padding:28px 32px 130px;scroll-behavior:smooth}.content.today{scroll-snap-type:y proximity}
    .today-screen{min-height:calc(100vh - 205px);display:flex;flex-direction:column;scroll-snap-align:start}
    .today-line{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:18px}.done-button{background:transparent;color:var(--muted);border-radius:14px;padding:8px 10px}
    .today-empty{flex:1;display:grid;place-items:center;text-align:center;color:var(--muted);padding:40px}.today-empty strong{display:block;color:var(--text);font-size:23px;letter-spacing:-.04em;margin-bottom:8px}
    .planned-cue{margin-top:auto;display:grid;place-items:center;gap:2px;color:var(--muted);padding-bottom:22px;animation:breathe 2.2s infinite}.planned-cue button{background:transparent;color:var(--muted);padding:8px 16px;border-radius:999px}.planned-cue span{font-size:28px;color:var(--accent)}
    .planned{min-height:100vh;scroll-snap-align:start;padding-top:32px}.planned h3{margin:0 0 18px;color:var(--muted);font-size:20px;letter-spacing:-.03em}
    .day{border-radius:22px;padding:15px;margin-bottom:13px;background:color-mix(in srgb,var(--panel) 70%,transparent);border:1px solid var(--line);box-shadow:0 10px 24px rgba(20,25,35,.06);animation:rise .3s ease both}
    .day.empty{background:transparent;border-color:transparent;box-shadow:none;padding:5px 0}.day-head{display:flex;align-items:baseline;gap:9px;padding-bottom:11px}.day-head h3{margin:0;color:var(--text);font-size:21px}.day-head span{color:var(--muted);font-size:13px}
    .empty-box{min-height:72px;display:grid;place-items:center;border-radius:20px;background:color-mix(in srgb,var(--muted) 8%,transparent);border:1px dashed color-mix(in srgb,var(--muted) 20%,transparent);color:var(--muted)}
    .task{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:13px;align-items:start;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:14px;margin-bottom:9px;box-shadow:0 10px 22px rgba(20,25,35,.055);transition:.18s ease;animation:pop .24s ease both}
    .task:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(20,25,35,.11)}.task.done{opacity:.45}.task.done .task-title{text-decoration:line-through}
    .check{width:24px;height:24px;border-radius:50%;border:2px solid color-mix(in srgb,var(--muted) 30%,transparent);background:transparent;color:white}.task.done .check{background:var(--good);border-color:var(--good)}
    .task-title{font-weight:850;letter-spacing:-.025em}.task-notes{margin-top:4px;color:var(--muted);font-size:13px;line-height:1.38}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.chip{font-size:11px;padding:4px 8px;border-radius:999px;background:color-mix(in srgb,var(--muted) 12%,transparent);color:var(--muted)}
    .chip.high{background:color-mix(in srgb,var(--danger) 14%,transparent);color:var(--danger)}.chip.medium{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn)}.chip.low{background:color-mix(in srgb,var(--good) 14%,transparent);color:var(--good)}
    .star{background:transparent;color:color-mix(in srgb,var(--muted) 45%,transparent);font-size:22px}.star.on{color:#ffbd24;text-shadow:0 8px 22px rgba(255,189,36,.32)}
    .fab{position:absolute;right:34px;bottom:34px;width:70px;height:70px;border-radius:50%;background:var(--accent);color:#fff;font-size:40px;box-shadow:0 18px 36px color-mix(in srgb,var(--accent) 35%,transparent);z-index:5;transition:.18s ease}.fab:hover{transform:translateY(-3px) scale(1.03)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:.2s;z-index:9}.overlay.open{opacity:1;pointer-events:auto}
    .drawer{position:fixed;right:18px;top:18px;bottom:18px;width:min(510px,calc(100vw - 36px));border-radius:var(--radius);padding:22px;overflow:auto;transform:translateX(calc(100% + 28px));transition:transform .3s cubic-bezier(.2,.85,.2,1);z-index:10}
    .drawer.open{transform:translateX(0)}.drawer h2{margin:0 0 18px;font-size:31px;letter-spacing:-.055em}
    .science{border-radius:22px;padding:16px;margin-bottom:18px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,transparent),rgba(120,220,195,.12));border:1px solid var(--line)}.science strong{display:block;margin-bottom:5px}.science p{margin:0;color:var(--muted);font-size:14px;line-height:1.42}
    .form{display:grid;gap:13px}label{display:grid;gap:7px;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.075em;text-transform:uppercase}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.spacer{margin-left:auto}
    .pills{display:flex;gap:7px;flex-wrap:wrap}.pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;color:var(--muted);padding:8px 11px}.pill:hover{color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
    .list-grid{display:grid;gap:12px;max-width:760px}.list-card{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:21px;padding:16px;text-align:left;box-shadow:0 10px 24px rgba(20,25,35,.06);transition:.18s}.list-card:hover{transform:translateY(-2px)}.list-icon{width:43px;height:43px;border-radius:15px;display:grid;place-items:center;color:white;font-size:20px}.list-card strong{display:block;letter-spacing:-.03em}.list-card small{color:var(--muted)}
    .calendar-box{display:grid;gap:12px;max-width:780px}.calendar-row{display:flex;gap:12px;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px}.calendar-row p{margin:3px 0 0;color:var(--muted);font-size:13px}
    .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);padding:12px 16px;border-radius:999px;opacity:0;transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @keyframes enter{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}@keyframes pop{from{opacity:0;transform:translateY(7px) scale(.985)}to{opacity:1;transform:none}}@keyframes breathe{0%,100%{transform:translateY(0);opacity:.75}50%{transform:translateY(5px);opacity:1}}
    @media(max-width:900px){body{overflow:auto}.app{grid-template-columns:1fr;height:auto;min-height:100vh}.sidebar{display:none}.main{min-height:100vh}.top{flex-direction:column;align-items:stretch}.row,.row3{grid-template-columns:1fr}.drawer{left:18px;width:auto}.fab{right:26px;bottom:26px;width:64px;height:64px}.title h2{font-size:42px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar glass">
      <div class="brand"><div class="logo">✦</div><div><h1>DoAstra</h1><p>Focused work, beautifully planned</p></div></div>
      <nav class="nav">
        <button data-view="today" class="active">☀️ Today <span class="count" id="todayCount">0</span></button>
        <button data-view="inbox">📥 Inbox <span class="count" id="inboxCount">0</span></button>
        <button data-view="all">🧠 All Tasks <span class="count" id="allCount">0</span></button>
        <button data-view="starred">⭐ Important <span class="count" id="starCount">0</span></button>
        <button data-view="calendar">📅 Calendar <span class="count">ICS</span></button>
        <button data-view="settings">⚙️ Settings</button>
      </nav>
      <div class="section-title">Personal Lists</div>
      <div class="lists" id="lists"></div>
      <button class="add-list" id="addListBtn">+ New List</button>
    </aside>

    <main class="main glass">
      <header class="top">
        <div class="title"><h2 id="pageTitle">☀️ Today</h2><p id="pageSubtitle">Only today’s scheduled work appears here. Swipe up for Planned.</p></div>
        <button class="btn ghost" id="jumpToday">Jump to Today</button>
        <button class="btn primary" id="newTaskBtn">+ New Task</button>
      </header>
      <section class="content today" id="content"></section>
      <button class="fab" id="fab">+</button>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="toast" id="toast">Saved</div>

  <aside class="drawer glass" id="taskDrawer">
    <h2 id="drawerTitle">New Task</h2>
    <div class="science"><strong>Science cue</strong><p>Choose a clear next action and decide when you will work on it. This turns intention into execution.</p></div>
    <div class="form">
      <label>Task title<input id="taskTitle" placeholder="Example: Finish biology notes"></label>
      <label>Notes / next action<textarea id="taskNotes" placeholder="Example: Open notebook, summarize pages 12–18, then make flashcards."></textarea></label>
      <div class="row"><label>List<select id="taskList"></select></label><label>Priority<select id="taskPriority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></label></div>
      <div class="row"><label>Due date<input id="taskDue" type="date"></label><label>Work dates<input id="taskWorkDates" placeholder="2026-06-30, 2026-07-01"></label></div>
      <div class="row"><label>Estimated time<input id="taskTime" placeholder="45 min, 2 hours, 137 min"></label><label>Time-block start<input id="taskStart" type="time"></label></div>
      <div class="pills"><button class="pill" data-time="15 min">15m</button><button class="pill" data-time="25 min">25m</button><button class="pill" data-time="45 min">45m</button><button class="pill" data-time="90 min">90m</button><button class="pill" data-time="2 hours">2h</button></div>
      <div class="row"><label>Energy<select id="taskEnergy"><option>Low</option><option selected>Medium</option><option>High</option><option>Extreme</option></select></label><label>Science method<select id="taskMethod"><option>Deep Work</option><option>Implementation Intention</option><option>Next Action</option><option>Eisenhower Important</option><option>Planning Fallacy Buffer</option></select></label></div>
      <label><span><input id="taskStarred" type="checkbox" style="width:auto;margin-right:8px"> Mark important ⭐</span></label>
    </div>
    <div class="actions"><button class="btn primary" id="saveTask">Save Task</button><button class="btn ghost" id="exportTask">Export .ics</button><button class="btn ghost" id="closeTask">Cancel</button><button class="btn danger spacer" id="deleteTask">Delete</button></div>
  </aside>

  <aside class="drawer glass" id="listDrawer">
    <h2 id="listTitle">New List</h2>
    <div class="form">
      <label>List name<input id="listName" placeholder="Example: School"></label>
      <div class="row"><label>Icon<input id="listIcon" placeholder="📘" maxlength="3"></label><label>Color<input id="listColor" type="color" value="#1687ff"></label></div>
    </div>
    <div class="actions"><button class="btn primary" id="saveList">Save List</button><button class="btn ghost" id="closeList">Cancel</button><button class="btn danger spacer" id="deleteList">Delete List</button></div>
  </aside>

<script>
const $=id=>document.getElementById(id);
const state={view:"today",selectedList:null,editingTask:null,editingList:null,lists:[],tasks:[],settings:{dark:false,accent:"#1687ff",name:"Astra User",showEmpty:true,defaultTime:"25 min",science:true,animation:"normal"}};
const starters=[{id:crypto.randomUUID(),name:"School",icon:"📘",color:"#1687ff"},{id:crypto.randomUUID(),name:"Coding",icon:"💻",color:"#21a977"},{id:crypto.randomUUID(),name:"Reading",icon:"📚",color:"#f5a524"}];
function todayISO(){return new Date().toISOString().slice(0,10)} function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x} function toISO(d){return d.toISOString().slice(0,10)}
function pretty(iso){return new Date(iso+"T12:00:00").toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function rank(p){return {high:0,medium:1,low:2}[p]??3} function list(id){return state.lists.find(x=>x.id===id)}
function appears(t,iso){return t.due===iso||(t.workDates||[]).includes(iso)}
function load(){const s=JSON.parse(localStorage.getItem("doastra-v5")||"null");if(s)Object.assign(state,s);else state.lists=starters;apply()}
function save(){localStorage.setItem("doastra-v5",JSON.stringify({view:state.view,selectedList:state.selectedList,lists:state.lists,tasks:state.tasks,settings:state.settings}))}
function apply(){document.body.classList.toggle("dark",state.settings.dark);document.documentElement.style.setProperty("--accent",state.settings.accent||"#1687ff")}
function toast(t="Saved"){$("toast").textContent=t;$("toast").classList.add("show");clearTimeout(window.tt);window.tt=setTimeout(()=>$("toast").classList.remove("show"),1400)}
function counts(){$("todayCount").textContent=state.tasks.filter(t=>!t.done&&appears(t,todayISO())).length;$("inboxCount").textContent=state.tasks.filter(t=>!t.done&&!t.listId).length;$("allCount").textContent=state.tasks.filter(t=>!t.done).length;$("starCount").textContent=state.tasks.filter(t=>!t.done&&t.starred).length}
function active(){document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===state.view))}
function renderLists(){const w=$("lists");w.innerHTML="";state.lists.forEach(l=>{const c=state.tasks.filter(t=>!t.done&&t.listId===l.id).length;const r=document.createElement("div");r.className="list-row";r.innerHTML=`<span class="dot" style="background:${l.color}"></span><span class="list-name">${l.icon} ${esc(l.name)}</span><span class="list-actions"><span class="count">${c}</span><button class="mini">⋯</button></span>`;r.onclick=()=>{state.view="list";state.selectedList=l.id;render()};r.querySelector(".mini").onclick=e=>{e.stopPropagation();openList(l.id)};w.appendChild(r)})}
function taskCard(t){const l=list(t.listId);const e=document.createElement("article");e.className="task"+(t.done?" done":"");e.innerHTML=`<button class="check">${t.done?"✓":""}</button><div><div class="task-title">${esc(t.title)}</div>${t.notes?`<div class="task-notes">${esc(t.notes)}</div>`:""}<div class="chips"><span class="chip ${t.priority}">${t.priority}</span><span class="chip">${esc(t.time||state.settings.defaultTime)}</span><span class="chip">${esc(t.energy||"Medium")}</span>${t.start?`<span class="chip">Start ${t.start}</span>`:""}${t.due?`<span class="chip">Due ${t.due}</span>`:""}${l?`<span class="chip" style="color:${l.color}">${l.icon} ${esc(l.name)}</span>`:`<span class="chip">Inbox</span>`}${t.method?`<span class="chip">${esc(t.method)}</span>`:""}</div></div><button class="star ${t.starred?"on":""}">★</button>`;
e.querySelector(".check").onclick=x=>{x.stopPropagation();t.done=!t.done;save();render();toast(t.done?"Completed":"Reopened")};e.querySelector(".star").onclick=x=>{x.stopPropagation();t.starred=!t.starred;save();render()};e.onclick=()=>openTask(t.id);return e}
function renderTaskList(tasks){const c=$("content");c.classList.remove("today");c.innerHTML="";const a=[...tasks].sort((x,y)=>Number(y.starred)-Number(x.starred)||rank(x.priority)-rank(y.priority));if(!a.length){c.innerHTML='<div class="empty-box">Nothing here yet.</div>';return}a.forEach(t=>c.appendChild(taskCard(t)))}
function renderToday(){const c=$("content");c.classList.add("today");c.innerHTML="";const today=todayISO();const tasks=state.tasks.filter(t=>!t.done&&appears(t,today)).sort((x,y)=>Number(y.starred)-Number(x.starred)||rank(x.priority)-rank(y.priority));const done=state.tasks.filter(t=>t.done&&appears(t,today)).length;const sec=document.createElement("section");sec.className="today-screen";sec.id="todayBlock";sec.innerHTML=`<div class="today-line"><span>${done} completed today</span><button class="done-button">✓</button></div><div id="todayArea"></div><div class="planned-cue"><button id="toPlanned">Planned</button><span>⌄</span></div>`;c.appendChild(sec);const area=$("todayArea");if(tasks.length)tasks.forEach(t=>area.appendChild(taskCard(t)));else area.innerHTML='<div class="today-empty"><div><strong>No tasks scheduled for today.</strong><p>Only tasks with today as a due date or work date appear here.</p></div></div>';const planned=document.createElement("section");planned.className="planned";planned.id="planned";planned.innerHTML="<h3>Planned future work</h3>";c.appendChild(planned);const start=new Date(today+"T12:00:00");for(let i=1;i<365;i++){const iso=toISO(addDays(start,i));const ts=state.tasks.filter(t=>!t.done&&appears(t,iso));if(!ts.length&&!state.settings.showEmpty&&i>7)continue;const d=document.createElement("section");d.className="day"+(!ts.length&&i>7?" empty":"");d.innerHTML=`<div class="day-head"><h3>${pretty(iso)}</h3><span>${ts.length} task${ts.length===1?"":"s"}</span></div>`;if(ts.length)ts.sort((x,y)=>Number(y.starred)-Number(x.starred)||rank(x.priority)-rank(y.priority)).forEach(t=>d.appendChild(taskCard(t)));else if(i<7||state.settings.showEmpty)d.innerHTML+=`<div class="empty-box">No planned work for this day.</div>`;planned.appendChild(d)}$("toPlanned").onclick=()=>$("planned").scrollIntoView({behavior:"smooth",block:"start"});c.scrollTo({top:0,behavior:"instant"})}
function renderListOverview(){const c=$("content");c.classList.remove("today");c.innerHTML='<div class="list-grid" id="lg"></div>';const g=$("lg");if(!state.lists.length){g.innerHTML='<div class="empty-box">No lists yet.</div>';return}state.lists.forEach(l=>{const n=state.tasks.filter(t=>!t.done&&t.listId===l.id).length;const b=document.createElement("button");b.className="list-card";b.innerHTML=`<div class="list-icon" style="background:${l.color}">${l.icon}</div><div><strong>${esc(l.name)}</strong><small>${n} unfinished task${n===1?"":"s"}</small></div><span class="count">${n}</span>`;b.onclick=()=>{state.view="list";state.selectedList=l.id;render()};g.appendChild(b)})}
function renderCalendar(){const c=$("content");c.classList.remove("today");c.innerHTML=`<div class="calendar-box"><div class="science"><strong>Calendar time blocking</strong><p>This static GitHub Pages app can export .ics files for Apple Calendar, Google Calendar, Outlook, and other calendar apps. Live multi-account sync needs a backend login system later.</p></div><div class="calendar-row"><div><strong>Export all planned work</strong><p>Creates an .ics file from tasks with due/work dates.</p></div><button class="btn primary" id="exportAll">Export .ics</button></div></div>`;$("exportAll").onclick=exportAllICS}
function renderSettings(){const c=$("content");c.classList.remove("today");c.innerHTML=`<div class="form" style="max-width:760px"><div class="science"><strong>Settings</strong><p>Customize your workspace. Saved locally in this browser.</p></div><div class="row"><label>Name<input id="setName" value="${esc(state.settings.name)}"></label><label>Theme<select id="setDark"><option value="false">Light</option><option value="true">Dark</option></select></label></div><div class="row3"><label>Accent<input type="color" id="setAccent" value="${state.settings.accent}"></label><label>Default time<input id="setTime" value="${esc(state.settings.defaultTime)}"></label><label>Empty days<select id="setEmpty"><option value="true">Show</option><option value="false">Hide after week</option></select></label></div><div class="row"><label>Science suggestions<select id="setScience"><option value="true">On</option><option value="false">Off</option></select></label><label>Animation speed<select id="setAnim"><option>normal</option><option>fast</option><option>slow</option></select></label></div><div class="actions"><button class="btn primary" id="saveSettings">Save Settings</button><button class="btn ghost" id="backup">Export Backup</button><button class="btn danger" id="reset">Reset App</button></div></div>`;$("setDark").value=String(state.settings.dark);$("setEmpty").value=String(state.settings.showEmpty);$("setScience").value=String(state.settings.science);$("setAnim").value=state.settings.animation;$("saveSettings").onclick=()=>{state.settings.name=$("setName").value.trim()||"Astra User";state.settings.dark=$("setDark").value==="true";state.settings.accent=$("setAccent").value;state.settings.defaultTime=$("setTime").value.trim()||"25 min";state.settings.showEmpty=$("setEmpty").value==="true";state.settings.science=$("setScience").value==="true";state.settings.animation=$("setAnim").value;apply();save();render();toast("Settings saved")};$("backup").onclick=backup;$("reset").onclick=()=>{if(confirm("Reset DoAstra on this browser?")){localStorage.removeItem("doastra-v5");location.reload()}}}
function render(){renderLists();counts();active();const title=$("pageTitle"),sub=$("pageSubtitle");if(state.view==="today"){title.innerHTML="☀️ Today";sub.textContent="Only today’s scheduled work appears here. Swipe up for Planned.";renderToday()}else if(state.view==="inbox"){title.textContent="Inbox";sub.textContent="Tasks not assigned to any list.";renderTaskList(state.tasks.filter(t=>!t.done&&!t.listId))}else if(state.view==="all"){title.textContent="All Tasks";sub.textContent="Every unfinished task from every list and Inbox.";renderTaskList(state.tasks.filter(t=>!t.done))}else if(state.view==="starred"){title.textContent="Important";sub.textContent="Only starred tasks.";renderTaskList(state.tasks.filter(t=>!t.done&&t.starred))}else if(state.view==="calendar"){title.textContent="Calendar";sub.textContent="Export your planned work blocks.";renderCalendar()}else if(state.view==="settings"){title.textContent="Settings";sub.textContent="Customize DoAstra.";renderSettings()}else if(state.view==="lists"){title.textContent="Lists";sub.textContent="Choose a personal list.";renderListOverview()}else if(state.view==="list"){const l=list(state.selectedList);title.textContent=l?`${l.icon} ${l.name}`:"List";sub.textContent="Tasks assigned to this list.";renderTaskList(state.tasks.filter(t=>!t.done&&t.listId===state.selectedList))}save()}
function openTask(id=null){state.editingTask=id;const t=id?state.tasks.find(x=>x.id===id):null;$("drawerTitle").textContent=t?"Edit Task":"New Task";$("deleteTask").style.display=t?"inline-flex":"none";$("taskList").innerHTML='<option value="">Inbox</option>'+state.lists.map(l=>`<option value="${l.id}">${l.icon} ${esc(l.name)}</option>`).join("");$("taskTitle").value=t?.title||"";$("taskNotes").value=t?.notes||"";$("taskList").value=t?.listId||(state.view==="list"?state.selectedList:"");$("taskPriority").value=t?.priority||"medium";$("taskDue").value=t?.due||"";$("taskWorkDates").value=(t?.workDates||[]).join(", ");$("taskTime").value=t?.time||state.settings.defaultTime;$("taskStart").value=t?.start||"";$("taskEnergy").value=t?.energy||"Medium";$("taskMethod").value=t?.method||"Deep Work";$("taskStarred").checked=!!t?.starred;$("overlay").classList.add("open");$("taskDrawer").classList.add("open");setTimeout(()=>$("taskTitle").focus(),100)}
function saveTask(){const title=$("taskTitle").value.trim();if(!title)return alert("Task title is required.");const data={title,notes:$("taskNotes").value.trim(),listId:$("taskList").value||null,priority:$("taskPriority").value,due:$("taskDue").value,workDates:$("taskWorkDates").value.split(",").map(x=>x.trim()).filter(Boolean),time:$("taskTime").value.trim()||state.settings.defaultTime,start:$("taskStart").value,energy:$("taskEnergy").value,method:$("taskMethod").value,starred:$("taskStarred").checked};if(state.editingTask)Object.assign(state.tasks.find(t=>t.id===state.editingTask),data);else state.tasks.unshift({id:crypto.randomUUID(),...data,done:false,created:Date.now()});save();close();render();toast("Task saved")}
function openList(id=null){state.editingList=id;const l=id?list(id):null;$("listTitle").textContent=l?"Edit List":"New List";$("deleteList").style.display=l?"inline-flex":"none";$("listName").value=l?.name||"";$("listIcon").value=l?.icon||"✨";$("listColor").value=l?.color||"#1687ff";$("overlay").classList.add("open");$("listDrawer").classList.add("open")}
function saveList(){const name=$("listName").value.trim();if(!name)return alert("List name is required.");const data={name,icon:$("listIcon").value.trim()||"✨",color:$("listColor").value};if(state.editingList)Object.assign(list(state.editingList),data);else state.lists.push({id:crypto.randomUUID(),...data});save();close();render();toast("List saved")}
function close(){$("overlay").classList.remove("open");$("taskDrawer").classList.remove("open");$("listDrawer").classList.remove("open");state.editingTask=null;state.editingList=null}
function mins(s){s=String(s||"").toLowerCase();const n=parseFloat(s)||25;return s.includes("hour")?Math.round(n*60):Math.round(n)}
function icsDate(date,time="09:00"){const[y,m,d]=date.split("-");const[hh,mm]=(time||"09:00").split(":");return `${y}${m}${d}T${hh}${mm}00`}
function escICS(s){return String(s||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;")}
function makeICS(tasks){let ev=[];tasks.forEach(t=>{const dates=t.workDates?.length?t.workDates:(t.due?[t.due]:[]);dates.forEach(date=>{const st=t.start||"09:00";const sd=new Date(`${date}T${st}:00`);const ed=new Date(sd.getTime()+mins(t.time)*60000);const end=`${ed.getFullYear()}${String(ed.getMonth()+1).padStart(2,"0")}${String(ed.getDate()).padStart(2,"0")}T${String(ed.getHours()).padStart(2,"0")}${String(ed.getMinutes()).padStart(2,"0")}00`;ev.push(`BEGIN:VEVENT\nUID:${t.id}-${date}@doastra\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,"").split(".")[0]}Z\nDTSTART:${icsDate(date,st)}\nDTEND:${end}\nSUMMARY:${escICS(t.title)}\nDESCRIPTION:${escICS(t.notes||"DoAstra task")}\nEND:VEVENT`)})});return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//DoAstra//EN\nCALSCALE:GREGORIAN\n${ev.join("\n")}\nEND:VCALENDAR`}
function dl(name,text,type="text/calendar"){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function exportAllICS(){const p=state.tasks.filter(t=>!t.done&&(t.due||t.workDates?.length));if(!p.length)return alert("No planned tasks to export.");dl("doastra-calendar.ics",makeICS(p));toast("Calendar exported")}
function exportTask(){const t=state.editingTask?state.tasks.find(x=>x.id===state.editingTask):null;if(!t)return alert("Save the task first, then export it.");dl("doastra-task.ics",makeICS([t]));toast("Task exported")}
function backup(){dl("doastra-backup.json",JSON.stringify({lists:state.lists,tasks:state.tasks,settings:state.settings},null,2),"application/json")}
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.selectedList=null;render()});
$("newTaskBtn").onclick=()=>openTask();$("fab").onclick=()=>openTask();$("jumpToday").onclick=()=>{state.view="today";render();setTimeout(()=>$("content").scrollTo({top:0,behavior:"smooth"}),60)}
$("saveTask").onclick=saveTask;$("closeTask").onclick=close;$("overlay").onclick=close;$("deleteTask").onclick=()=>{if(!state.editingTask)return;if(confirm("Delete this task?")){state.tasks=state.tasks.filter(t=>t.id!==state.editingTask);save();close();render();toast("Task deleted")}};$("exportTask").onclick=exportTask
document.querySelectorAll(".pill").forEach(p=>p.onclick=e=>{e.preventDefault();$("taskTime").value=p.dataset.time});
$("addListBtn").onclick=()=>openList();$("saveList").onclick=saveList;$("closeList").onclick=close;$("deleteList").onclick=()=>{if(!state.editingList)return;const l=list(state.editingList);if(confirm(`Delete "${l.name}"? Tasks move to Inbox.`)){state.tasks.forEach(t=>{if(t.listId===state.editingList)t.listId=null});state.lists=state.lists.filter(x=>x.id!==state.editingList);state.view="inbox";save();close();render();toast("List deleted")}}
document.addEventListener("keydown",e=>{if(e.key==="Escape")close();if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="n"){e.preventDefault();openTask()}});
load();render();
</script>
</body>
