<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoAstra</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: rgba(255,255,255,.78);
      --surface2: #ffffff;
      --surface3: #f0f1f4;
      --text: #17181d;
      --muted: #7b7f89;
      --line: rgba(30,35,50,.10);
      --accent: #2f6df6;
      --accent2: #8bdcc2;
      --danger: #ff4d5e;
      --warning: #ffad2f;
      --success: #21b177;
      --shadow: 0 24px 70px rgba(25,28,38,.12);
      --soft-shadow: 0 10px 24px rgba(25,28,38,.08);
      --radius: 26px;
      --fontSize: 16px;
      --density: 1;
    }

    body.dark {
      --bg: #0f1118;
      --surface: rgba(26,29,39,.82);
      --surface2: #181b25;
      --surface3: #222633;
      --text: #f4f5fa;
      --muted: #9fa5b5;
      --line: rgba(255,255,255,.10);
      --shadow: 0 24px 80px rgba(0,0,0,.34);
      --soft-shadow: 0 10px 28px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--fontSize);
      background:
        radial-gradient(circle at 7% 5%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 34%),
        radial-gradient(circle at 95% 92%, color-mix(in srgb, var(--accent2) 16%, transparent), transparent 30%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input, textarea, select { font: inherit; color: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea, select { min-width: 0; }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0,1fr);
      gap: 18px;
      height: 100vh;
      padding: 18px;
    }

    .glass {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .sidebar {
      border-radius: var(--radius);
      padding: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: enter .55s cubic-bezier(.2,.85,.2,1) both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 9px 8px 19px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 17px;
      position: relative;
      display: grid;
      place-items: center;
      color: white;
      background:
        radial-gradient(circle at 37% 32%, #fff 0 3px, transparent 4px),
        linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 15px 34px color-mix(in srgb, var(--accent) 34%, transparent);
      overflow: hidden;
    }

    .logo:before, .logo:after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1.7px solid rgba(255,255,255,.65);
      border-radius: 50%;
      transform: rotate(-25deg) scaleX(1.45);
    }

    .logo:after {
      transform: rotate(35deg) scaleX(1.45);
      opacity: .55;
    }

    .logo span {
      position: relative;
      z-index: 1;
      font-weight: 950;
      font-size: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.055em;
    }

    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

    .nav { display: grid; gap: 7px; margin-bottom: 17px; }

    .nav button, .list-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: calc(11px * var(--density)) 12px;
      border-radius: 16px;
      background: transparent;
      text-align: left;
      color: var(--text);
      transition: transform .18s ease, background .18s ease, color .18s ease;
      position: relative;
    }

    .nav button:hover, .list-row:hover {
      transform: translateX(4px);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .nav button.active {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--accent);
      font-weight: 800;
    }

    .count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: color-mix(in srgb, var(--muted) 12%, transparent);
      padding: 3px 8px;
      border-radius: 999px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .11em;
      font-weight: 900;
      color: var(--muted);
      margin: 9px 8px;
    }

    .lists { overflow: auto; padding-right: 4px; }

    .list-dot {
      width: 13px;
      height: 13px;
      border-radius: 5px;
      flex: 0 0 auto;
    }

    .list-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mini-btn {
      background: transparent;
      color: var(--muted);
      width: 25px;
      height: 25px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      transition: background .16s ease, color .16s ease, transform .16s ease;
    }

    .mini-btn:hover {
      background: color-mix(in srgb, var(--muted) 15%, transparent);
      transform: scale(1.06);
    }

    .add-list {
      margin-top: 13px;
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 17px;
      padding: 12px;
      color: var(--accent);
      transition: transform .18s ease, background .18s ease;
    }

    .add-list:hover {
      transform: translateY(-2px);
      background: color-mix(in srgb, var(--accent) 9%, transparent);
    }

    .main {
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      animation: enter .55s cubic-bezier(.2,.85,.2,1) .05s both;
      min-width: 0;
    }

    .topbar {
      padding: 26px 30px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 13px;
      background: linear-gradient(to bottom, color-mix(in srgb, var(--surface2) 52%, transparent), transparent);
    }

    .page-title { flex: 1; min-width: 0; }
    .page-title h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 42px);
      letter-spacing: -.065em;
      line-height: .95;
    }
    .page-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .btn {
      border-radius: 16px;
      padding: 12px 16px;
      font-weight: 760;
      transition: transform .18s ease, filter .18s ease, background .18s ease, box-shadow .18s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-2px); }
    .primary {
      color: white;
      background: var(--accent);
      box-shadow: 0 16px 30px color-mix(in srgb, var(--accent) 33%, transparent);
    }
    .ghost {
      background: color-mix(in srgb, var(--surface2) 74%, transparent);
      border: 1px solid var(--line);
    }
    .danger {
      background: color-mix(in srgb, var(--danger) 13%, transparent);
      color: var(--danger);
    }

    .content {
      overflow: auto;
      padding: 24px 30px 120px;
      scroll-behavior: smooth;
    }

    .day-block {
      margin-bottom: 18px;
      border-radius: 23px;
      padding: 15px;
      background: color-mix(in srgb, var(--surface2) 56%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      box-shadow: var(--soft-shadow);
      animation: rise .34s ease both;
    }

    .day-block.empty-day {
      background: transparent;
      box-shadow: none;
      border-color: transparent;
      padding: 10px 0;
      margin-bottom: 5px;
    }

    .day-header {
      display: flex;
      align-items: baseline;
      gap: 9px;
      padding: 0 0 11px;
    }

    .day-header h3 {
      margin: 0;
      font-size: 21px;
      line-height: 1.05;
      letter-spacing: -.04em;
    }

    .day-header span { color: var(--muted); font-size: 13px; }

    .empty {
      min-height: 66px;
      display: grid;
      place-items: center;
      border-radius: 19px;
      background: color-mix(in srgb, var(--muted) 9%, transparent);
      color: var(--muted);
      border: 1px dashed color-mix(in srgb, var(--muted) 22%, transparent);
      text-align: center;
      padding: 16px;
    }

    .task {
      display: grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      gap: 13px;
      align-items: start;
      border-radius: 19px;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(20,24,34,.055);
      margin-bottom: 9px;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      animation: pop .25s ease both;
    }

    .task:hover {
      transform: translateY(-2px) scale(1.003);
      box-shadow: 0 16px 34px rgba(20,24,34,.11);
    }

    .task.done { opacity: .48; }
    .task.done .task-title { text-decoration: line-through; }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--muted) 28%, transparent);
      background: transparent;
      display: grid;
      place-items: center;
      color: white;
      transition: transform .16s ease, background .16s ease, border .16s ease;
    }

    .check:hover { transform: scale(1.1); }
    .task.done .check { background: var(--success); border-color: var(--success); }

    .task-title { font-weight: 850; letter-spacing: -.025em; }
    .task-notes {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
    .chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--muted) 12%, transparent);
      color: var(--muted);
      white-space: nowrap;
    }
    .chip.high { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
    .chip.medium { background: color-mix(in srgb, var(--warning) 16%, transparent); color: var(--warning); }
    .chip.low { background: color-mix(in srgb, var(--success) 14%, transparent); color: var(--success); }

    .star {
      background: transparent;
      color: color-mix(in srgb, var(--muted) 42%, transparent);
      font-size: 22px;
      transition: transform .18s ease, color .18s ease, text-shadow .18s ease;
    }
    .star:hover { transform: scale(1.18) rotate(9deg); }
    .star.on {
      color: #ffbf2d;
      text-shadow: 0 8px 22px rgba(255,191,45,.32);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 9;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed;
      right: 18px;
      top: 18px;
      bottom: 18px;
      width: min(500px, calc(100vw - 36px));
      border-radius: var(--radius);
      padding: 22px;
      overflow: auto;
      transform: translateX(calc(100% + 28px));
      transition: transform .31s cubic-bezier(.2,.85,.2,1);
      z-index: 10;
    }
    .drawer.open { transform: translateX(0); }

    .drawer h2 {
      margin: 0 0 18px;
      font-size: 30px;
      letter-spacing: -.055em;
    }

    .science-card {
      border-radius: 22px;
      padding: 16px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 13%, transparent), color-mix(in srgb, var(--accent2) 14%, transparent));
      border: 1px solid color-mix(in srgb, var(--accent2) 24%, var(--line));
      margin-bottom: 18px;
    }
    .science-card strong { display: block; margin-bottom: 5px; }
    .science-card p { margin: 0; color: var(--muted); line-height: 1.42; font-size: 14px; }

    .form-grid { display: grid; gap: 13px; }

    label {
      display: grid;
      gap: 7px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .075em;
      font-weight: 900;
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface2) 92%, transparent);
      padding: 12px 13px;
      outline: none;
      transition: border .15s ease, box-shadow .15s ease, background .15s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 13%, transparent);
    }

    textarea { min-height: 92px; resize: vertical; }

    .row { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 12px; }
    .row-3 { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); gap: 12px; }

    .focus-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .pill-options {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    .pill {
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface2) 75%, transparent);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      transition: transform .15s ease, background .15s ease, color .15s ease;
    }
    .pill:hover, .pill.selected {
      transform: translateY(-1px);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .spacer { margin-left: auto; }

    .calendar-box {
      display: grid;
      gap: 12px;
      max-width: 760px;
    }
    .calendar-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface2);
      padding: 14px;
    }
    .calendar-row div p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .calendar-row strong { letter-spacing: -.02em; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      background: color-mix(in srgb, var(--surface2) 90%, transparent);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity .22s ease, transform .22s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes enter {
      from { opacity: 0; transform: translateY(16px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(7px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 920px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .main { min-height: 80vh; }
      .topbar { flex-direction: column; align-items: stretch; }
      .row, .row-3, .focus-wrap { grid-template-columns: 1fr; }
      .drawer { left: 18px; width: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar glass">
      <div class="brand">
        <div class="logo"><span>✦</span></div>
        <div>
          <h1>DoAstra</h1>
          <p>Focused work, beautifully planned</p>
        </div>
      </div>

      <nav class="nav">
        <button class="active" data-view="today">☀️ Today <span class="count" id="todayCount">0</span></button>
        <button data-view="inbox">📥 Inbox <span class="count" id="inboxCount">0</span></button>
        <button data-view="all">🧠 All Tasks <span class="count" id="allCount">0</span></button>
        <button data-view="starred">⭐ Starred <span class="count" id="starCount">0</span></button>
        <button data-view="calendar">📆 Calendar <span class="count">ICS</span></button>
        <button data-view="settings">⚙️ Settings</button>
      </nav>

      <div class="section-title">Personal Lists</div>
      <div class="lists" id="lists"></div>
      <button class="add-list" id="addListBtn">+ New List</button>
    </aside>

    <main class="main glass">
      <header class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">Today</h2>
          <p id="pageSubtitle">Plan the day, then scroll through the year.</p>
        </div>
        <button class="btn ghost" id="jumpToday">Jump to Today</button>
        <button class="btn primary" id="newTaskBtn">+ New Task</button>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="toast" id="toast">Saved</div>

  <aside class="drawer glass" id="taskDrawer">
    <h2 id="drawerTitle">New Task</h2>
    <div class="science-card">
      <strong>Science cue</strong>
      <p>Choose a clear next action and decide when you will work on it. This turns intention into execution.</p>
    </div>

    <div class="form-grid">
      <label>Task title
        <input id="taskTitle" placeholder="Example: Finish biology notes" />
      </label>

      <label>Notes / next action
        <textarea id="taskNotes" placeholder="Example: Open notebook, summarize pages 12–18, then make 10 flashcards."></textarea>
      </label>

      <div class="row">
        <label>List
          <select id="taskList"></select>
        </label>
        <label>Priority
          <select id="taskPriority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label>Due date
          <input id="taskDue" type="date" />
        </label>
        <label>Work dates
          <input id="taskWorkDates" placeholder="2026-06-30, 2026-07-01" />
        </label>
      </div>

      <label>Focus time
        <div class="focus-wrap">
          <input id="taskFocusManual" placeholder="Type: 35 min, 2 hours..." />
          <select id="taskFocusSuggested">
            <option value="">Suggested times</option>
            <option>5 min</option>
            <option>10 min</option>
            <option>15 min</option>
            <option>20 min</option>
            <option>25 min</option>
            <option>30 min</option>
            <option>45 min</option>
            <option>60 min</option>
            <option>75 min</option>
            <option>90 min</option>
            <option>2 hours</option>
            <option>3 hours</option>
          </select>
        </div>
      </label>

      <div class="pill-options" id="focusPills">
        <button class="pill" data-time="15 min">15</button>
        <button class="pill" data-time="25 min">25</button>
        <button class="pill" data-time="45 min">45</button>
        <button class="pill" data-time="90 min">90</button>
        <button class="pill" data-time="2 hours">2h</button>
      </div>

      <div class="row">
        <label>Energy
          <select id="taskEnergy">
            <option>Easy</option>
            <option selected>Medium</option>
            <option>Hard</option>
            <option>Extreme</option>
          </select>
        </label>
        <label>Time-block start
          <input id="taskStartTime" type="time" />
        </label>
      </div>

      <label>
        <span><input id="taskStarred" type="checkbox" style="width:auto;margin-right:8px;"> Mark as significant ⭐</span>
      </label>
    </div>

    <div class="actions">
      <button class="btn primary" id="saveTask">Save Task</button>
      <button class="btn ghost" id="exportThisTask">Export .ics</button>
      <button class="btn ghost" id="closeDrawer">Cancel</button>
      <button class="btn danger spacer" id="deleteTask">Delete</button>
    </div>
  </aside>

  <aside class="drawer glass" id="listDrawer">
    <h2 id="listDrawerTitle">New List</h2>
    <div class="form-grid">
      <label>List name
        <input id="listName" placeholder="Example: School" />
      </label>
      <div class="row">
        <label>Icon
          <input id="listIcon" placeholder="📘" maxlength="3" />
        </label>
        <label>Color
          <input id="listColor" type="color" value="#2f6df6" />
        </label>
      </div>
    </div>
    <div class="actions">
      <button class="btn primary" id="saveList">Save List</button>
      <button class="btn ghost" id="closeListDrawer">Cancel</button>
      <button class="btn danger spacer" id="deleteList">Delete List</button>
    </div>
  </aside>

  <script>
    const $ = id => document.getElementById(id);

    const state = {
      view: "today",
      selectedList: null,
      editingTask: null,
      editingList: null,
      lists: [],
      tasks: [],
      settings: {
        userName: "Astra User",
        dark: true,
        accent: "#5b7cfa",
        fontSize: 16,
        density: 1,
        showEmptyDays: true,
        defaultFocus: "25 min"
      }
    };

    const starterLists = [
      { id: crypto.randomUUID(), name: "School", icon: "📘", color: "#5b7cfa" },
      { id: crypto.randomUUID(), name: "Coding", icon: "💻", color: "#26b37a" },
      { id: crypto.randomUUID(), name: "Reading", icon: "📚", color: "#ffb020" }
    ];

    function todayISO() { return new Date().toISOString().slice(0,10); }
    function addDays(date, days) { const d = new Date(date); d.setDate(d.getDate()+days); return d; }
    function toISO(d) { return d.toISOString().slice(0,10); }
    function prettyDate(iso) {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
    }
    function priorityRank(p) { return { high:0, medium:1, low:2 }[p] ?? 3; }
    function listById(id) { return state.lists.find(l => l.id === id); }
    function escapeHTML(str) {
      return String(str || "").replace(/[&<>"']/g, s => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[s]));
    }

    function applySettings() {
      document.body.classList.toggle("dark", state.settings.dark);
      document.documentElement.style.setProperty("--accent", state.settings.accent || "#5b7cfa");
      document.documentElement.style.setProperty("--fontSize", (state.settings.fontSize || 16) + "px");
      document.documentElement.style.setProperty("--density", state.settings.density || 1);
    }

    function load() {
      const saved = JSON.parse(localStorage.getItem("doastra-v2") || "null");
      if (saved) Object.assign(state, saved);
      else {
        state.lists = starterLists;
        state.tasks = [];
      }
      applySettings();
    }

    function save() {
      localStorage.setItem("doastra-v2", JSON.stringify({
        view: state.view,
        selectedList: state.selectedList,
        lists: state.lists,
        tasks: state.tasks,
        settings: state.settings
      }));
    }

    function toast(text="Saved") {
      $("toast").textContent = text;
      $("toast").classList.add("show");
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => $("toast").classList.remove("show"), 1500);
    }

    function taskAppearsOn(task, iso) {
      return task.due === iso || (task.workDates || []).includes(iso);
    }

    function updateCounts() {
      $("todayCount").textContent = state.tasks.filter(t => !t.done && taskAppearsOn(t, todayISO())).length;
      $("inboxCount").textContent = state.tasks.filter(t => !t.done && !t.listId).length;
      $("allCount").textContent = state.tasks.filter(t => !t.done).length;
      $("starCount").textContent = state.tasks.filter(t => !t.done && t.starred).length;
    }

    function setActiveNav(view) {
      document.querySelectorAll(".nav button").forEach(b => b.classList.toggle("active", b.dataset.view === view));
    }

    function renderLists() {
      const wrap = $("lists");
      wrap.innerHTML = "";
      state.lists.forEach(list => {
        const count = state.tasks.filter(t => !t.done && t.listId === list.id).length;
        const row = document.createElement("div");
        row.className = "list-row";
        row.innerHTML = `
          <span class="list-dot" style="background:${list.color}"></span>
          <span>${list.icon} ${escapeHTML(list.name)}</span>
          <span class="list-actions">
            <span class="count">${count}</span>
            <button class="mini-btn edit-list" title="Edit list">⋯</button>
          </span>
        `;
        row.onclick = () => {
          state.view = "list";
          state.selectedList = list.id;
          render();
        };
        row.querySelector(".edit-list").onclick = (e) => {
          e.stopPropagation();
          openListDrawer(list.id);
        };
        wrap.appendChild(row);
      });
    }

    function taskCard(task) {
      const list = listById(task.listId);
      const el = document.createElement("article");
      el.className = "task" + (task.done ? " done" : "");
      el.innerHTML = `
        <button class="check">${task.done ? "✓" : ""}</button>
        <div>
          <div class="task-title">${escapeHTML(task.title)}</div>
          ${task.notes ? `<div class="task-notes">${escapeHTML(task.notes)}</div>` : ""}
          <div class="chips">
            <span class="chip ${task.priority}">${task.priority}</span>
            <span class="chip">${escapeHTML(task.focus || state.settings.defaultFocus || "25 min")}</span>
            <span class="chip">${escapeHTML(task.energy || "Medium")}</span>
            ${task.startTime ? `<span class="chip">Start ${task.startTime}</span>` : ""}
            ${task.due ? `<span class="chip">Due ${task.due}</span>` : ""}
            ${list ? `<span class="chip" style="color:${list.color}">${list.icon} ${escapeHTML(list.name)}</span>` : `<span class="chip">Inbox</span>`}
          </div>
        </div>
        <button class="star ${task.starred ? "on" : ""}">★</button>
      `;
      el.querySelector(".check").onclick = e => {
        e.stopPropagation();
        task.done = !task.done;
        save();
        render();
        toast(task.done ? "Completed" : "Reopened");
      };
      el.querySelector(".star").onclick = e => {
        e.stopPropagation();
        task.starred = !task.starred;
        save();
        render();
      };
      el.onclick = () => openTaskDrawer(task.id);
      return el;
    }

    function renderTaskList(tasks) {
      const content = $("content");
      content.innerHTML = "";
      const ordered = [...tasks].sort((a,b) => Number(b.starred)-Number(a.starred) || priorityRank(a.priority)-priorityRank(b.priority));
      if (!ordered.length) {
        content.innerHTML = `<div class="empty">Nothing here yet. Add a task and write the next physical action.</div>`;
        return;
      }
      ordered.forEach(t => content.appendChild(taskCard(t)));
    }

    function renderTodayYear() {
      const content = $("content");
      content.innerHTML = "";
      const start = new Date(todayISO() + "T12:00:00");
      for (let i=0; i<365; i++) {
        const iso = toISO(addDays(start, i));
        const tasks = state.tasks.filter(t => !t.done && taskAppearsOn(t, iso));
        if (!tasks.length && !state.settings.showEmptyDays && i > 7) continue;

        const block = document.createElement("section");
        block.className = "day-block" + (!tasks.length && i > 7 ? " empty-day" : "");
        if (iso === todayISO()) block.id = "todayBlock";
        block.innerHTML = `
          <div class="day-header">
            <h3>${i === 0 ? "Today" : prettyDate(iso)}</h3>
            <span>${tasks.length} task${tasks.length === 1 ? "" : "s"}</span>
          </div>
        `;
        if (tasks.length) {
          tasks.sort((a,b) => Number(b.starred)-Number(a.starred) || priorityRank(a.priority)-priorityRank(b.priority))
            .forEach(t => block.appendChild(taskCard(t)));
        } else if (i < 7 || state.settings.showEmptyDays) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No planned work for this day.";
          block.appendChild(empty);
        }
        content.appendChild(block);
      }
    }

    function renderCalendar() {
      $("content").innerHTML = `
        <div class="calendar-box">
          <div class="science-card">
            <strong>Calendar time blocking</strong>
            <p>This static GitHub Pages app cannot securely connect to live Google or Apple Calendar accounts without a backend login system. But it can export .ics calendar files that import into Apple Calendar, Google Calendar, Outlook, and more.</p>
          </div>
          <div class="calendar-row">
            <div><strong>Export all planned work blocks</strong><p>Creates one .ics file from tasks with work dates or due dates.</p></div>
            <button class="btn primary" id="exportAllICS">Export .ics</button>
          </div>
          <div class="calendar-row">
            <div><strong>Google Calendar</strong><p>Import the .ics file into Google Calendar settings, or open it from your device.</p></div>
            <button class="btn ghost" onclick="window.open('https://calendar.google.com/calendar/u/0/r/settings/export', '_blank')">Open Google Calendar</button>
          </div>
          <div class="calendar-row">
            <div><strong>Apple Calendar</strong><p>Download the .ics file, then open it on iPad, iPhone, or Mac.</p></div>
            <button class="btn ghost" id="exportAppleICS">Download .ics</button>
          </div>
          <div class="calendar-row">
            <div><strong>Future upgrade</strong><p>Real multi-account syncing needs Google OAuth, Apple/CalDAV support, and a backend server.</p></div>
            <span class="chip">advanced</span>
          </div>
        </div>
      `;
      $("exportAllICS").onclick = exportAllICS;
      $("exportAppleICS").onclick = exportAllICS;
    }

    function renderSettings() {
      $("content").innerHTML = `
        <div class="form-grid" style="max-width:760px">
          <div class="science-card">
            <strong>Personal workspace</strong>
            <p>Customize the look and planning behavior. These settings save in this browser.</p>
          </div>
          <div class="row">
            <label>User name
              <input id="settingsName" value="${escapeHTML(state.settings.userName)}">
            </label>
            <label>Theme
              <select id="settingsDark">
                <option value="false">Light Mode</option>
                <option value="true">Dark Mode</option>
              </select>
            </label>
          </div>
          <div class="row-3">
            <label>Accent color
              <input id="settingsAccent" type="color" value="${state.settings.accent || "#5b7cfa"}">
            </label>
            <label>Font size
              <select id="settingsFont">
                <option value="15">Compact</option>
                <option value="16">Normal</option>
                <option value="18">Large</option>
              </select>
            </label>
            <label>Spacing
              <select id="settingsDensity">
                <option value=".9">Compact</option>
                <option value="1">Normal</option>
                <option value="1.15">Comfortable</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>Default focus time
              <input id="settingsFocus" value="${escapeHTML(state.settings.defaultFocus || "25 min")}">
            </label>
            <label>Year view
              <select id="settingsEmpty">
                <option value="true">Show empty days</option>
                <option value="false">Hide empty days after this week</option>
              </select>
            </label>
          </div>
          <div class="actions">
            <button class="btn primary" id="saveSettings">Save Settings</button>
            <button class="btn ghost" id="exportData">Export Backup</button>
            <button class="btn danger" id="resetApp">Reset App</button>
          </div>
        </div>
      `;
      $("settingsDark").value = String(state.settings.dark);
      $("settingsFont").value = String(state.settings.fontSize || 16);
      $("settingsDensity").value = String(state.settings.density || 1);
      $("settingsEmpty").value = String(state.settings.showEmptyDays);
      $("saveSettings").onclick = () => {
        state.settings.userName = $("settingsName").value.trim() || "Astra User";
        state.settings.dark = $("settingsDark").value === "true";
        state.settings.accent = $("settingsAccent").value;
        state.settings.fontSize = Number($("settingsFont").value);
        state.settings.density = Number($("settingsDensity").value);
        state.settings.defaultFocus = $("settingsFocus").value.trim() || "25 min";
        state.settings.showEmptyDays = $("settingsEmpty").value === "true";
        applySettings();
        save();
        render();
        toast("Settings saved");
      };
      $("exportData").onclick = exportBackup;
      $("resetApp").onclick = () => {
        if (!confirm("Reset DoAstra on this browser?")) return;
        localStorage.removeItem("doastra-v2");
        location.reload();
      };
    }

    function render() {
      renderLists();
      updateCounts();
      setActiveNav(state.view);
      const title = $("pageTitle"), sub = $("pageSubtitle");

      if (state.view === "today") {
        title.textContent = "Today";
        sub.textContent = "Plan the day, then scroll through the year.";
        renderTodayYear();
      } else if (state.view === "inbox") {
        title.textContent = "Inbox";
        sub.textContent = "Capture quickly. Organize later.";
        renderTaskList(state.tasks.filter(t => !t.done && !t.listId));
      } else if (state.view === "all") {
        title.textContent = "All Tasks";
        sub.textContent = "Every unfinished task.";
        renderTaskList(state.tasks.filter(t => !t.done));
      } else if (state.view === "starred") {
        title.textContent = "Starred";
        sub.textContent = "Your most significant work.";
        renderTaskList(state.tasks.filter(t => !t.done && t.starred));
      } else if (state.view === "calendar") {
        title.textContent = "Calendar";
        sub.textContent = "Export time blocks to your calendar app.";
        renderCalendar();
      } else if (state.view === "settings") {
        title.textContent = "Settings";
        sub.textContent = "Customize DoAstra.";
        renderSettings();
      } else if (state.view === "list") {
        const list = listById(state.selectedList);
        title.textContent = list ? `${list.icon} ${list.name}` : "List";
        sub.textContent = "A focused personal list.";
        renderTaskList(state.tasks.filter(t => !t.done && t.listId === state.selectedList));
      }
      save();
    }

    function openTaskDrawer(id=null) {
      state.editingTask = id;
      const task = id ? state.tasks.find(t => t.id === id) : null;
      $("drawerTitle").textContent = task ? "Edit Task" : "New Task";
      $("deleteTask").style.display = task ? "inline-flex" : "none";

      $("taskList").innerHTML = `<option value="">Inbox</option>` + state.lists.map(l => `<option value="${l.id}">${l.icon} ${escapeHTML(l.name)}</option>`).join("");

      $("taskTitle").value = task?.title || "";
      $("taskNotes").value = task?.notes || "";
      $("taskList").value = task?.listId || (state.view === "list" ? state.selectedList : "");
      $("taskPriority").value = task?.priority || "medium";
      $("taskDue").value = task?.due || "";
      $("taskWorkDates").value = (task?.workDates || []).join(", ");
      $("taskFocusManual").value = task?.focus || state.settings.defaultFocus || "25 min";
      $("taskFocusSuggested").value = "";
      $("taskEnergy").value = task?.energy || "Medium";
      $("taskStartTime").value = task?.startTime || "";
      $("taskStarred").checked = Boolean(task?.starred);

      $("overlay").classList.add("open");
      $("taskDrawer").classList.add("open");
      setTimeout(() => $("taskTitle").focus(), 120);
    }

    function saveTask() {
      const title = $("taskTitle").value.trim();
      if (!title) return alert("Task title is required.");

      const data = {
        title,
        notes: $("taskNotes").value.trim(),
        listId: $("taskList").value || null,
        priority: $("taskPriority").value,
        due: $("taskDue").value,
        workDates: $("taskWorkDates").value.split(",").map(x => x.trim()).filter(Boolean),
        focus: $("taskFocusManual").value.trim() || state.settings.defaultFocus || "25 min",
        energy: $("taskEnergy").value,
        startTime: $("taskStartTime").value,
        starred: $("taskStarred").checked
      };

      if (state.editingTask) {
        Object.assign(state.tasks.find(t => t.id === state.editingTask), data);
      } else {
        state.tasks.unshift({ id: crypto.randomUUID(), ...data, done: false, created: Date.now() });
      }
      save();
      closeDrawers();
      render();
      toast("Task saved");
    }

    function openListDrawer(id=null) {
      state.editingList = id;
      const list = id ? listById(id) : null;
      $("listDrawerTitle").textContent = list ? "Edit List" : "New List";
      $("listName").value = list?.name || "";
      $("listIcon").value = list?.icon || "✨";
      $("listColor").value = list?.color || "#2f6df6";
      $("deleteList").style.display = list ? "inline-flex" : "none";
      $("overlay").classList.add("open");
      $("listDrawer").classList.add("open");
      setTimeout(() => $("listName").focus(), 120);
    }

    function saveList() {
      const name = $("listName").value.trim();
      if (!name) return alert("List name is required.");
      if (state.editingList) {
        Object.assign(listById(state.editingList), {
          name, icon: $("listIcon").value.trim() || "✨", color: $("listColor").value
        });
      } else {
        state.lists.push({ id: crypto.randomUUID(), name, icon: $("listIcon").value.trim() || "✨", color: $("listColor").value });
      }
      save();
      closeDrawers();
      render();
      toast("List saved");
    }

    function deleteList() {
      if (!state.editingList) return;
      const list = listById(state.editingList);
      if (!confirm(`Delete list "${list.name}"? Tasks will move to Inbox.`)) return;
      state.tasks.forEach(t => { if (t.listId === state.editingList) t.listId = null; });
      state.lists = state.lists.filter(l => l.id !== state.editingList);
      if (state.selectedList === state.editingList) {
        state.view = "inbox";
        state.selectedList = null;
      }
      save();
      closeDrawers();
      render();
      toast("List deleted");
    }

    function closeDrawers() {
      $("overlay").classList.remove("open");
      $("taskDrawer").classList.remove("open");
      $("listDrawer").classList.remove("open");
      state.editingTask = null;
      state.editingList = null;
    }

    function minutesFromFocus(str) {
      const s = String(str || "").toLowerCase();
      const n = parseFloat(s);
      if (!n) return 25;
      if (s.includes("hour")) return Math.round(n * 60);
      return Math.round(n);
    }

    function icsDate(date, time="09:00") {
      const [y,m,d] = date.split("-");
      const [hh,mm] = (time || "09:00").split(":");
      return `${y}${m}${d}T${hh}${mm}00`;
    }

    function makeICS(tasks) {
      const events = [];
      tasks.forEach(task => {
        const dates = (task.workDates?.length ? task.workDates : task.due ? [task.due] : []);
        dates.forEach(date => {
          const start = task.startTime || "09:00";
          const mins = minutesFromFocus(task.focus);
          const startD = new Date(`${date}T${start}:00`);
          const endD = new Date(startD.getTime() + mins*60000);
          const end = `${endD.getFullYear()}${String(endD.getMonth()+1).padStart(2,"0")}${String(endD.getDate()).padStart(2,"0")}T${String(endD.getHours()).padStart(2,"0")}${String(endD.getMinutes()).padStart(2,"0")}00`;
          events.push(`BEGIN:VEVENT
UID:${task.id}-${date}@doastra
DTSTAMP:${new Date().toISOString().replace(/[-:]/g,"").split(".")[0]}Z
DTSTART:${icsDate(date,start)}
DTEND:${end}
SUMMARY:${escapeICS(task.title)}
DESCRIPTION:${escapeICS(task.notes || "DoAstra task")}
END:VEVENT`);
        });
      });
      return `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//DoAstra//Time Blocking//EN
CALSCALE:GREGORIAN
${events.join("\n")}
END:VCALENDAR`;
    }

    function escapeICS(s) {
      return String(s || "").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");
    }

    function download(filename, text) {
      const blob = new Blob([text], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportAllICS() {
      const planned = state.tasks.filter(t => !t.done && (t.due || t.workDates?.length));
      if (!planned.length) return alert("No planned tasks to export.");
      download("doastra-calendar.ics", makeICS(planned));
      toast("Calendar exported");
    }

    function exportCurrentTaskICS() {
      const task = state.editingTask ? state.tasks.find(t => t.id === state.editingTask) : null;
      if (!task) return alert("Save the task first, then export it.");
      download("doastra-task.ics", makeICS([task]));
      toast("Task exported");
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify({ lists:state.lists, tasks:state.tasks, settings:state.settings }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "doastra-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".nav button").forEach(btn => {
      btn.onclick = () => {
        state.view = btn.dataset.view;
        state.selectedList = null;
        render();
      };
    });

    $("newTaskBtn").onclick = () => openTaskDrawer();
    $("jumpToday").onclick = () => {
      state.view = "today";
      render();
      setTimeout(() => $("todayBlock")?.scrollIntoView({ behavior:"smooth", block:"start" }), 60);
    };

    $("saveTask").onclick = saveTask;
    $("deleteTask").onclick = () => {
      if (!state.editingTask) return;
      if (!confirm("Delete this task?")) return;
      state.tasks = state.tasks.filter(t => t.id !== state.editingTask);
      save();
      closeDrawers();
      render();
      toast("Task deleted");
    };
    $("exportThisTask").onclick = exportCurrentTaskICS;
    $("closeDrawer").onclick = closeDrawers;
    $("overlay").onclick = closeDrawers;

    $("addListBtn").onclick = () => openListDrawer();
    $("saveList").onclick = saveList;
    $("deleteList").onclick = deleteList;
    $("closeListDrawer").onclick = closeDrawers;

    $("taskFocusSuggested").onchange = e => {
      if (e.target.value) $("taskFocusManual").value = e.target.value;
    };
    document.querySelectorAll("#focusPills .pill").forEach(p => {
      p.onclick = () => {
        $("taskFocusManual").value = p.dataset.time;
        document.querySelectorAll("#focusPills .pill").forEach(x => x.classList.remove("selected"));
        p.classList.add("selected");
      };
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawers();
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n") {
        e.preventDefault();
        openTaskDrawer();
      }
    });

    load();
    render();
  </script>
</body>
</html>
